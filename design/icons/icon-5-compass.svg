<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="会食ナビ アイコン案5 円卓ナビ">
  <defs>
    <linearGradient id="g5gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e6c987"/>
      <stop offset="1" stop-color="#b98f3f"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="#f6f3ec"/>
  <rect x="12" y="12" width="488" height="488" rx="101" fill="none" stroke="#17253f" stroke-opacity="0.10" stroke-width="3"/>
  <!-- 方位ティック -->
  <g fill="#b98f3f">
    <rect x="250" y="46" width="12" height="30" rx="6"/>
    <rect x="250" y="436" width="12" height="30" rx="6"/>
