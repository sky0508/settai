  <circle cx="256" cy="256" r="120" fill="none" stroke="#c2a15a" stroke-opacity="0.45" stroke-width="4"/>
  <!-- 箸（コンパスの針） -->
  <g stroke-linecap="round">
    <line x1="176" y1="336" x2="336" y2="176" stroke="#17253f" stroke-width="16"/>
    <line x1="156" y1="316" x2="316" y2="156" stroke="#17253f" stroke-width="16"/>
    <line x1="306" y1="206" x2="336" y2="176" stroke="url(#g5gold)" stroke-width="16"/>
    <line x1="286" y1="186" x2="316" y2="156" stroke="url(#g5gold)" stroke-width="16"/>
